<!DOCTYPE html>
<html lang="en">
<!--
design-decisions:
  Role: Live trading terminal — the kind a regional-bank analyst has open all day alongside their Bloomberg.
  Stance: These four Midwest-anchored banks are Main Street's pulse: when they move, the economy underneath you is breathing.
  Sections:
    1. Header — establishes "this is now, this is live, this is specific."
    2. Four stock cards — each sparkline IS the claim: you see the price story before you read the number.
    3. 30-day performance ranking — the claim that they diverge sharply even as a peer group.
  Interactions:
    - Sparkline crosshair hover: price at every point is discoverable.
    - Performance bars: animate on load, ranked by return.
  Sting: The ranked bar chart. You leave knowing which bank won and which lost.
  Colors: --green (gained), --red (fell), --blue (neutral accent), --dim (secondary).
  Typography: monospace for numbers (terminal authenticity), system-ui for labels.
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regional Bank Stock Dashboard</title>
<style>
:root {
  --bg: #070b12;
  --surface: #0d1220;
  --card: #0f1623;
  --border: #1c2a3a;
  --border-hi: #263748;
  --green: #10b981;
  --green-dim: rgba(16,185,129,0.15);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --blue: #3b82f6;
  --text: #e2e8f0;
  --dim: #4b6280;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:20px 24px 40px}

/* LOADING */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;transition:opacity 0.4s}
#loader.gone{opacity:0;pointer-events:none}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-label{font-size:0.75rem;font-family:monospace;color:var(--dim);letter-spacing:0.15em}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.h-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--dim);margin-bottom:6px}
.h-sub{font-size:1.05rem;font-weight:600;color:var(--text)}
.h-right{display:flex;align-items:center;gap:10px}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.ts{font-family:monospace;font-size:0.75rem;color:var(--dim)}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--dim);padding:7px 13px;border-radius:6px;cursor:pointer;font-size:0.78rem;font-family:monospace;display:flex;align-items:center;gap:6px;transition:all 0.2s;letter-spacing:0.05em}
.btn:hover{border-color:var(--blue);color:var(--blue)}

/* SECTION LABEL */
.sec-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--dim);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden;transition:border-color 0.25s,transform 0.2s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0.7}
.card.pos::before{background:var(--green)}
.card.neg::before{background:var(--red)}
.card:hover{transform:translateY(-2px)}
.card.pos{border-color:rgba(16,185,129,0.25)}
.card.neg{border-color:rgba(239,68,68,0.2)}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.ticker{font-family:monospace;font-size:1.35rem;font-weight:700;letter-spacing:0.04em}
.co-name{font-size:0.7rem;color:var(--dim);margin-top:3px}
.chip{font-size:0.68rem;font-family:monospace;padding:3px 8px;border-radius:4px;font-weight:600}
.chip.pos{background:var(--green-dim);color:var(--green)}
.chip.neg{background:var(--red-dim);color:var(--red)}

.price{font-family:monospace;font-size:1.95rem;font-weight:700;line-height:1;margin-bottom:4px}
.change-row{font-family:monospace;font-size:0.8rem;color:var(--dim);margin-bottom:14px}
.change-row .pos{color:var(--green)}
.change-row .neg{color:var(--red)}

.spark-wrap{position:relative;height:58px;margin:0 -2px}
.spark-wrap canvas{display:block;width:100%;height:100%}
.tip{position:absolute;top:-2px;background:var(--surface);border:1px solid var(--border-hi);border-radius:5px;padding:5px 9px;font-size:0.7rem;font-family:monospace;pointer-events:none;opacity:0;transition:opacity 0.12s;white-space:nowrap;z-index:5}

.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.stat label{display:block;font-size:0.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px}
.stat span{font-family:monospace;font-size:0.82rem}

/* PERFORMANCE */
.perf-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:24px}
.perf-row{display:grid;grid-template-columns:70px 1fr 80px;align-items:center;gap:14px;margin-bottom:14px}
.perf-row:last-child{margin-bottom:0}
.perf-tk{font-family:monospace;font-size:0.88rem;font-weight:600}
.track{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.bar{height:100%;border-radius:4px;width:0;transition:width 1.1s cubic-bezier(0.22,1,0.36,1)}
.pval{font-family:monospace;font-size:0.82rem;text-align:right}
.pval.pos{color:var(--green)}
.pval.neg{color:var(--red)}

/* NOTE */
.note{font-size:0.7rem;color:var(--dim);text-align:center;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:7px;line-height:1.5}

@media(max-width:560px){
  body{padding:14px 14px 32px}
  .cards{grid-template-columns:1fr}
  .price{font-size:1.6rem}
}
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div class="load-label">FETCHING MARKET DATA</div>
</div>

<header>
  <div>
    <div class="h-title">Market Terminal</div>
    <div class="h-sub">Regional Bank Tracker</div>
  </div>
  <div class="h-right">
    <div class="live-dot"></div>
    <span class="ts" id="ts">--</span>
    <button class="btn" onclick="loadAll()">&#8635; Refresh</button>
  </div>
</header>

<section>
  <div class="sec-label">Live Quotes</div>
  <div class="cards" id="cards"></div>
</section>

<section>
  <div class="sec-label">30-Day Performance</div>
  <div class="perf-panel" id="perf"></div>
</section>

<div class="note" id="note">Loading&#8230;</div>

<script>
const STOCKS = [
  {ticker:'FITB', name:'Fifth Third Bancorp',    exch:'NASDAQ'},
  {ticker:'HBAN', name:'Huntington Bancshares',  exch:'NASDAQ'},
  {ticker:'KEY',  name:'KeyCorp',                exch:'NYSE'},
  {ticker:'PNC',  name:'PNC Financial Services', exch:'NYSE'},
];

// Seeded LCG for deterministic mock data
function mkRng(seed){
  let s=seed;
  return ()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296};
}

function genHist(base,days=30,vol=0.014,drift=0.0002,seed=42){
  const rng=mkRng(seed);
  const h=[base];
  for(let i=1;i<days;i++){
    const z=(rng()-0.5)*2;
    h.push(+(h[h.length-1]*(1+drift+vol*z)).toFixed(3));
  }
  return h;
}

// Approximate prices — live fetch updates these if CORS allows
const MOCK={
  FITB:{price:41.23,change:0.58,pct:1.43,vol:'8.3M',mcap:'28.4B',pe:'12.4',div:'3.8%',hist:genHist(39.2,30,0.013,0.0005,11)},
  HBAN:{price:16.87,change:-0.12,pct:-0.70,vol:'14.6M',mcap:'22.1B',pe:'11.8',div:'4.6%',hist:genHist(16.5,30,0.015,-0.0002,22)},
  KEY: {price:18.24,change:0.31,pct:1.73,vol:'11.2M',mcap:'17.9B',pe:'13.1',div:'4.4%',hist:genHist(17.3,30,0.016,0.0004,33)},
  PNC: {price:179.42,change:-1.83,pct:-1.01,vol:'1.8M',mcap:'70.2B',pe:'14.2',div:'3.3%',hist:genHist(174.0,30,0.012,-0.0001,44)},
};

let data={};
let liveFetch=false;

async function fetchOne(ticker){
  const proxy='https://api.allorigins.win/get?url=';
  const yurl=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1mo`;
  const r=await fetch(proxy+encodeURIComponent(yurl),{signal:AbortSignal.timeout(7000)});
  const j=await r.json();
  const parsed=JSON.parse(j.contents);
  const res=parsed.chart.result[0];
  const meta=res.meta;
  const closes=res.indicators.quote[0].close.filter(Boolean);
  const prev=meta.chartPreviousClose;
  const price=meta.regularMarketPrice;
  const change=+(price-prev).toFixed(2);
  const pct=+((change/prev)*100).toFixed(2);
  return{
    price,change,pct,
    vol:fmtVol(meta.regularMarketVolume),
    mcap:fmtMcap(meta.marketCap),
    hist:closes,
    pe:MOCK[ticker].pe,
    div:MOCK[ticker].div,
  };
}

function fmtVol(v){
  if(!v)return'--';
  if(v>=1e9)return(v/1e9).toFixed(1)+'B';
  if(v>=1e6)return(v/1e6).toFixed(1)+'M';
  if(v>=1e3)return(v/1e3).toFixed(0)+'K';
  return''+v;
}
function fmtMcap(v){
  if(!v)return'--';
  if(v>=1e12)return(v/1e12).toFixed(1)+'T';
  if(v>=1e9)return(v/1e9).toFixed(1)+'B';
  return''+v;
}

async function loadAll(){
  document.getElementById('loader').classList.remove('gone');
  liveFetch=false;
  const results=await Promise.allSettled(STOCKS.map(s=>fetchOne(s.ticker)));
  results.forEach((r,i)=>{
    const t=STOCKS[i].ticker;
    if(r.status==='fulfilled'){data[t]={...MOCK[t],...r.value};liveFetch=true;}
    else{data[t]=MOCK[t];}
  });
  render();
  document.getElementById('loader').classList.add('gone');
}

function render(){
  document.getElementById('ts').textContent=new Date().toLocaleTimeString();
  renderCards();
  renderPerf();
  document.getElementById('note').textContent=liveFetch
    ?'✓ Live data via Yahoo Finance. Prices delayed ~15 min. Auto-refreshes every 60 s.'
    :'⚠ Live fetch unavailable (browser CORS). Showing realistic simulated prices for demonstration purposes.';
}

function renderCards(){
  const el=document.getElementById('cards');
  el.innerHTML='';
  STOCKS.forEach(s=>{
    const d=data[s.ticker];
    const pos=d.change>=0;
    const div=document.createElement('div');
    div.className='card '+(pos?'pos':'neg');
    div.innerHTML=`
      <div class="card-top">
        <div>
          <div class="ticker">${s.ticker}</div>
          <div class="co-name">${s.name}</div>
        </div>
        <div class="chip ${pos?'pos':'neg'}">${pos?'▲':'▼'} ${Math.abs(d.pct).toFixed(2)}%</div>
      </div>
      <div class="price">$${d.price.toFixed(2)}</div>
      <div class="change-row">
        <span class="${pos?'pos':'neg'}">${pos?'+':''}${d.change.toFixed(2)}</span>
        &nbsp;today &nbsp;·&nbsp; ${s.exch}
      </div>
      <div class="spark-wrap" id="sw-${s.ticker}">
        <canvas id="cv-${s.ticker}"></canvas>
        <div class="tip" id="tp-${s.ticker}"></div>
      </div>
      <div class="card-stats">
        <div class="stat"><label>Volume</label><span>${d.vol}</span></div>
        <div class="stat"><label>Mkt Cap</label><span>$${d.mcap}</span></div>
        <div class="stat"><label>P/E</label><span>${d.pe}</span></div>
        <div class="stat"><label>Div Yield</label><span>${d.div}</span></div>
      </div>`;
    el.appendChild(div);
    requestAnimationFrame(()=>drawSpark(s.ticker,d.hist,pos));
  });
}

function drawSpark(ticker,prices,pos){
  const wrap=document.getElementById('sw-'+ticker);
  const cv=document.getElementById('cv-'+ticker);
  const tip=document.getElementById('tp-'+ticker);
  if(!cv||!prices||prices.length<2)return;
  const dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth, H=wrap.clientHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);

  const mn=Math.min(...prices), mx=Math.max(...prices);
  const rng=mx-mn||1;
  const pad={t:6,b:6,l:3,r:3};
  const xS=i=>pad.l+(i/(prices.length-1))*(W-pad.l-pad.r);
  const yS=p=>pad.t+(1-(p-mn)/rng)*(H-pad.t-pad.b);

  function paint(dotIdx){
    const g=ctx.createLinearGradient(0,0,0,H);
    if(pos){g.addColorStop(0,'rgba(16,185,129,0.22)');g.addColorStop(1,'rgba(16,185,129,0)');}
    else{g.addColorStop(0,'rgba(239,68,68,0.22)');g.addColorStop(1,'rgba(239,68,68,0)');}
    ctx.clearRect(0,0,W,H);
    ctx.beginPath();ctx.moveTo(xS(0),H);
    prices.forEach((p,i)=>ctx.lineTo(xS(i),yS(p)));
    ctx.lineTo(xS(prices.length-1),H);ctx.closePath();
    ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();
    prices.forEach((p,i)=>i===0?ctx.moveTo(xS(i),yS(p)):ctx.lineTo(xS(i),yS(p)));
    ctx.strokeStyle=pos?'#10b981':'#ef4444';
    ctx.lineWidth=1.6;ctx.lineJoin='round';ctx.stroke();
    if(dotIdx!=null){
      const p=prices[dotIdx];
      ctx.beginPath();ctx.arc(xS(dotIdx),yS(p),3.5,0,Math.PI*2);
      ctx.fillStyle=pos?'#10b981':'#ef4444';ctx.fill();
      ctx.beginPath();ctx.arc(xS(dotIdx),yS(p),5.5,0,Math.PI*2);
      ctx.strokeStyle=pos?'rgba(16,185,129,0.35)':'rgba(239,68,68,0.35)';
      ctx.lineWidth=1.5;ctx.stroke();
    }
  }

  paint(null);

  cv.addEventListener('mousemove',e=>{
    const rect=cv.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const idx=Math.max(0,Math.min(Math.round((x/W)*(prices.length-1)),prices.length-1));
    paint(idx);
    const dAgo=prices.length-1-idx;
    tip.textContent='$'+prices[idx].toFixed(2)+' · '+(dAgo===0?'today':dAgo+'d ago');
    tip.style.opacity='1';
    tip.style.left=Math.min(x,W-115)+'px';
    tip.style.top='-2px';
  });
  cv.addEventListener('mouseleave',()=>{tip.style.opacity='0';paint(null);});
}

function renderPerf(){
  const perfs=STOCKS.map(s=>{
    const h=data[s.ticker].hist;
    if(!h||h.length<2)return{ticker:s.ticker,ret:0};
    return{ticker:s.ticker,ret:((h[h.length-1]-h[0])/h[0])*100};
  }).sort((a,b)=>b.ret-a.ret);

  const maxA=Math.max(...perfs.map(p=>Math.abs(p.ret)),0.01);
  const el=document.getElementById('perf');
  el.innerHTML=perfs.map(p=>{
    const pos=p.ret>=0;
    const bpct=(Math.abs(p.ret)/maxA)*100;
    return`<div class="perf-row" data-pct="${bpct}">
      <div class="perf-tk">${p.ticker}</div>
      <div class="track"><div class="bar" style="background:${pos?'var(--green)':'var(--red)'}"></div></div>
      <div class="pval ${pos?'pos':'neg'}">${pos?'+':''}${p.ret.toFixed(2)}%</div>
    </div>`;
  }).join('');

  requestAnimationFrame(()=>{
    setTimeout(()=>{
      document.querySelectorAll('.perf-row').forEach(row=>{
        row.querySelector('.bar').style.width=row.dataset.pct+'%';
      });
    },150);
  });
}

loadAll();
setInterval(loadAll,60000);
</script>
</body>
</html>
